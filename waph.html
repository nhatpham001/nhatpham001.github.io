<!DOCTYPE html>
<html>
<head>
<meta charset = "utf-8">
<title>WAPH - Nhat Pham Student</title>
<link rel="stylesheet"
href=https://waph-uc.github.io/style2.css>
</head>
<body>
<div id="container wrapper">
    <div id="top">
        <h1>Web Application Programming and Hacking</h1>
        <h2>Front-end web development lab</h2>
        <h3>Instructor: Dr. Phu Phung</h3>
    </div>
    <div id="menubar">
        <p>Student: Nhat Pham</p>
        <div id="email" onclick="showHideEmail()">Show my email</div>
        <script src="email.js"></script>
        <img src="images/headshot.jpeg" alt="My Headshot" width="50">
    </div>
    <div id="digital-clock"></div>
    <canvas id="analog-clock" width="150" height="150" style="background: color #999; ;"></canvas>
    <script src="https://waph-phung.github.io/clock.js"></script>

    <script>
        var canvas= document.getElementById("analog-clock");
        var ctx=canvas.getContext("2d");
        var radius= canvas.height / 2;

        ctx.translate(radius,radius);
        radius=radius*0.90;
        setInterval(drawClock,1000);

        function drawClock(){
            drawFace(ctx,radius);
            drawNumbers(ctx,radius);
            drawTime(ctx,radius);
        }
        
        function getEcho(){
            var input = document.getElementById("data").value;
            if (input.length == 0){
                return;
            }
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function(){
                if(this.readyState == 4 && this.status ==200){
                    console.log("Recieved data="+ xhttp.responseText);
                    document.getElementById("response").innerText = "response from server:" + xhttp.responseText;
                }
            }
            xhttp.open("GET", "echo.php?data="+input, true);
            xhttp.send();
            document.getElementById("data").value = "";
        }

        function jQueryAjax(){
            var input = $("#data").val();
            if (input.length == 0) return;
            $.get("echo.php?data=" + input, 
                function(result) {
                    $("#response").html("response from server:" + result);
                }
            );
            $("#data").val("");
        }
        function jQueryAjaxPOST(){
            var input = $("#data").val();
            if (input.length == 0) return;
            $.post("echo.php", {data: input}, 
                function(result) {
                    $("#response").html("response from server:" + result);
                }
            );
            $("#data").val();
        }
        $.get("https://v2.jokeapi.dev/joke/Programming?type=single", 
            function(result) {
                $("#response").html("The programming joke of the day: " + result.joke);
            })

        async function guessAge(name){
            const response = await fetch("https://api.agify.io/?name=" + name);
            const result = await response.json();
            $("#response").html("Hi " + name + " ,your age should be: " + result.age);
        }
        
    </script>
    <script>
        function displayTime() {
            document.getElementById('digital-clock').innerHTML = "Current time:" + new Date();
        }
        setInterval(displayTime, 500);
    </script>
    <div id="date" onclick="document.getElementById('date').innerHTML = Date()"> Show Date()</div>
    <div id="main">
        <p> A simple HTML page</p>
        using the <a href="https://www.w3schools.com/Html/" target="blank"> w3schools template</a>
        <hr>
    </div>
</div>
</body>
</html>
